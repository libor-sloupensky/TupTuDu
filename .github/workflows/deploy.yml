name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Jeden deploy najednou. Nové pushy počkají, až předchozí doběhne.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          MODE=incremental
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            MODE=full
          elif ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            MODE=full
          fi

          VENDOR_CHANGED=false
          ASSETS_CHANGED=false
          if [ "$MODE" = "full" ]; then
            VENDOR_CHANGED=true
            ASSETS_CHANGED=true
            echo "Režim: FULL deploy"
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
            echo "Změněné soubory:"
            echo "$CHANGED"
            echo "$CHANGED" | grep -qE '^composer\.(json|lock)$' && VENDOR_CHANGED=true
            echo "$CHANGED" | grep -qE '^(package\.json|package-lock\.json|vite\.config\.|resources/(css|js)/)' && ASSETS_CHANGED=true
            echo "$CHANGED" > /tmp/changed.txt
            echo "Režim: INCREMENTAL deploy"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "vendor_changed=$VENDOR_CHANGED" >> $GITHUB_OUTPUT
          echo "assets_changed=$ASSETS_CHANGED" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' && (steps.changes.outputs.assets_changed == 'true') }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies and build assets
        if: ${{ hashFiles('package.json') != '' && (steps.changes.outputs.assets_changed == 'true') }}
        run: |
          npm install
          npm run build

      - name: Create .env for production
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME="TupTuDu"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://www.tuptudu.com
          APP_LOCALE=cs
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=cs_CZ
          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12
          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error
          DB_CONNECTION=mariadb
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_NAME }}
          DB_USERNAME=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASS }}
          DB_CHARSET=utf8mb4
          DB_COLLATION=utf8mb4_unicode_ci
          SESSION_DRIVER=file
          SESSION_LIFETIME=10080
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null
          SESSION_SECURE_COOKIE=true
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file
          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="noreply@tuptudu.com"
          MAIL_FROM_NAME="TupTuDu"
          MASTER_ICO=07994605
          MASTER_PASSWORD=${{ secrets.MASTER_PASSWORD }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=claude-haiku-4-5-20251001
          ANTHROPIC_MODEL_HAIKU=claude-haiku-4-5
          ANTHROPIC_MODEL_SONNET=claude-sonnet-4-6
          ANTHROPIC_MODEL_OPUS=claude-opus-4-8
          VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://www.tuptudu.com/auth/google/callback
          MIGRATE_TOKEN=${{ secrets.MIGRATE_TOKEN }}
          ENVEOF
          sed -i 's/^          //' .env
          echo ".env vygenerován (hodnoty skryté)."

      - name: Deploy via lftp
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1
          MODE="${{ steps.changes.outputs.mode }}"

          LFTP_CMDS=$(mktemp)
          cat > "$LFTP_CMDS" << 'LFTPEOF'
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:timeout 30
          set net:connection-limit 3
          LFTPEOF
          sed -i 's/^          //' "$LFTP_CMDS"

          if [ "$MODE" = "full" ]; then
            echo "=== FULL MIRROR ==="
            cat >> "$LFTP_CMDS" << 'LFTPEOF'
          mirror --reverse --delete --no-perms --parallel=3 --verbose \
            --exclude .git/ \
            --exclude .github/ \
            --exclude .gitignore \
            --exclude .claude/ \
            --exclude CLAUDE.md \
            --exclude README.md \
            --exclude node_modules/ \
            . .
          LFTPEOF
            sed -i 's/^          //' "$LFTP_CMDS"
          else
            echo "=== INCREMENTAL ==="
            # .env vždy
            echo "put -O ./ .env" >> "$LFTP_CMDS"

            # Změněné soubory (mimo vyloučené cesty)
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                .git/*|.github/*|.gitignore|.claude/*|CLAUDE.md|README.md|node_modules/*) continue;;
              esac
              if [ -f "$f" ]; then
                dir=$(dirname "$f")
                if [ "$dir" != "." ]; then
                  echo "mkdir -pf $dir" >> "$LFTP_CMDS"
                  echo "put -O $dir/ $f" >> "$LFTP_CMDS"
                else
                  echo "put -O ./ $f" >> "$LFTP_CMDS"
                fi
                echo "  upload: $f"
              else
                echo "rm -f $f" >> "$LFTP_CMDS"
                echo "  delete: $f"
              fi
            done < /tmp/changed.txt

            # vendor: plně jen při změně composer.json/lock; jinak jen autoload (kvůli novým app třídám)
            if [ "${{ steps.changes.outputs.vendor_changed }}" = "true" ]; then
              echo "  vendor: full mirror"
              echo "mirror --reverse --delete --no-perms --parallel=3 vendor vendor" >> "$LFTP_CMDS"
            else
              echo "  vendor: jen autoload"
              echo "put -O vendor/ vendor/autoload.php" >> "$LFTP_CMDS"
              echo "mirror --reverse --no-perms vendor/composer vendor/composer" >> "$LFTP_CMDS"
            fi

            # public/build jen při změně assetů
            if [ "${{ steps.changes.outputs.assets_changed }}" = "true" ] && [ -d public/build ]; then
              echo "  public/build: mirror"
              echo "mirror --reverse --delete --no-perms --parallel=3 public/build public/build" >> "$LFTP_CMDS"
            fi
          fi

          echo "quit" >> "$LFTP_CMDS"
          echo "--- lftp commands ---"
          cat "$LFTP_CMDS"
          echo "---"

          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" < "$LFTP_CMDS"
          rm -f "$LFTP_CMDS"
          echo "=== Deploy complete ==="

      - name: Post-deploy hook (cache clear + migrace)
        run: |
          curl -sL --max-time 90 "https://www.tuptudu.com/deploy-hook.php?token=${{ secrets.MIGRATE_TOKEN }}&migrate&seed=1" 2>&1 || echo "Deploy hook selhal"
