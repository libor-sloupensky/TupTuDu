name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Jeden deploy najednou. Nové pushy počkají, až předchozí doběhne —
# zabrání souběžným lftp přenosům, které by si mohly překryvat soubory.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Vygenerovat config.php z GitHub Secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          # Bezpečně escapuje hodnotu pro PHP řetězec v jednoduchých uvozovkách
          # (zpětné lomítko a apostrof) — přes bash expanzi, bez sedu.
          esc() { local s=$1; s=${s//\\/\\\\}; s=${s//\'/\\\'}; printf '%s' "$s"; }

          cat > config.php << PHPEOF
          <?php
          // Generováno automaticky při deployi z GitHub Secrets — needitovat ručně.
          return [
              'db_host' => '$(esc "$DB_HOST")',
              'db_name' => '$(esc "$DB_NAME")',
              'db_user' => '$(esc "$DB_USER")',
              'db_pass' => '$(esc "$DB_PASS")',
          ];
          PHPEOF

          echo "config.php vygenerován (hodnoty skryté)."

      - name: Deploy via lftp (mirror)
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1

          LFTP_CMDS=$(mktemp)
          cat > "$LFTP_CMDS" << 'LFTPEOF'
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:timeout 30
          set net:connection-limit 3
          mirror --reverse --delete --no-perms --parallel=3 --verbose \
            --exclude .git/ \
            --exclude .github/ \
            --exclude .gitignore \
            --exclude .claude/ \
            --exclude CLAUDE.md \
            --exclude README.md \
            . .
          quit
          LFTPEOF
          sed -i 's/^          //' "$LFTP_CMDS"

          echo "--- lftp commands ---"
          cat "$LFTP_CMDS"
          echo "---"

          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" < "$LFTP_CMDS"
          rm -f "$LFTP_CMDS"
          echo "=== Deploy complete ==="
